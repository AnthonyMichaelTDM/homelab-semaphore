---
# Homelab Inventory
# Organized by service type and network zone
# Generated based on actual homelab topology

all:
  vars:
    package_manager: apt
    # Common SSH configuration
    ansible_user: ansible
  children:
    # ==========================================
    # HYPERVISOR & INFRASTRUCTURE
    # ==========================================
    hypervisors:
      vars:
        service_type: hypervisor
      hosts:
        r730xd-main:
          description: 'Dell R730XD - Proxmox VE host'
          os_distribution: proxmox
          os_family: debian
          services:
            - proxmox
            - ipmi
            - nut-client
          ansible_host: 192.168.1.2
          ports:
            - 22/tcp: 'SSH'
            - 8006/tcp: 'Proxmox web UI'
          storage:
            - zfs_pool: local-zfs
            - zfs_pool: tank1
            - zfs_pool: tank2

    # ==========================================
    # LXC CONTAINERS 
    # ==========================================
    lxc:
      vars:
        service_type: lxc
        container_type: lxc
        parent_hypervisor: r730xd-main
        os_family: debian
        os_distribution: debian
      children:
        lxc_internal: null
        lxc_dmz: null

    # Internal Services
    # (Private Subnet / Internal VLAN)
    lxc_internal:
      vars:
        vlan: private
        public_internet_facing: false
        proxied_by: npm
      hosts:
        lxc-101:
          ansible_host: 192.168.1.101
          description: 'Syncthing - File synchronization'
          os_distribution: archlinux
          os_family: archlinux
          package_manager: pacman
          services:
            - syncthing
          ports:
            - 8384/tcp: 'Syncthing web UI'
          mounted_volumes:
            - zfs_dataset: tank1/ds1/sync
              host_path: /tank1/ds1/sync
              guest_path: /mnt/sync
              persistent: true
              description: 'Syncthing sync data'
            - zfs_dataset: tank1/ds1/music
              host_path: /tank1/ds1/music
              guest_path: /mnt/music
              persistent: true
              description: 'Music library'

        lxc-102:
          ansible_host: 192.168.100.102
          description: 'NGINX Proxy Manager - Internal reverse proxy'
          proxy_engine: npm
          proxy_scope: private
          proxied_by: null
          services:
            - nginx
            - npm
          ports:
            - 22/tcp
            - 80/tcp
            - 443/tcp
            - 81/tcp
          port_descriptions:
            22/tcp: 'SSH'
            80/tcp: 'HTTP proxy entrypoint'
            443/tcp: 'HTTPS proxy entrypoint'
            81/tcp: 'NPM admin UI'
          routes:
            - domain: zoraxy.anthonyrubick.com
              target: lxc-200:8000
            - domain: syncthing.anthonyrubick.com
              target: lxc-101:8384
            - domain: home.anthonyrubick.com
              target: lxc-103:3000
            - domain: ris.anthonyrubick.com
              target: lxc-103:8080
            - domain: grafana.anthonyrubick.com
              target: lxc-104:3000
            - domain: influxdb.anthonyrubick.com
              target: lxc-105:8086
            - domain: peanut.anthonyrubick.com
              target: lxc-106:8080
            - domain: portainer.anthonyrubick.com
              target: lxc-107:9443
            - domain: loki.anthonyrubick.com
              target: lxc-108:3100
            - domain: semaphore.anthonyrubick.com
              target: lxc-109:3000
            - domain: aio.anthonyrubick.com
              target: vm-201:8080

        lxc-103:
          ansible_host: 192.168.1.103
          description: 'Homepage - Dashboard for homelab services'
          services:
            - homepage
            - random-image-server
          ports:
            - 3000/tcp: 'Homepage'
            - 8080/tcp: 'Random image server'

        lxc-104:
          ansible_host: 192.168.1.104
          description: 'Grafana - Monitoring and visualization dashboard'
          services:
            - grafana
          ports:
            - 3000/tcp: 'Grafana web UI'
          depends_on:
            - lxc-105
            - lxc-108

        lxc-105:
          ansible_host: 192.168.1.105
          description: 'InfluxDB - Time-series metrics database'
          services:
            - influxdb
            - telegraf
          ports:
            - 8086/tcp: 'InfluxDB HTTP API'

        lxc-106:
          ansible_host: 192.168.1.106
          description: 'PeaNUT - NUT web UI frontend for UPS monitoring'
          services:
            - peanut
            - nut-client
          ports:
            - 8080/tcp: 'PeaNUT web UI'
          depends_on:
            - thinkpad

        lxc-107:
          ansible_host: 192.168.1.107
          description: 'Portainer - Docker container management'
          services:
            - portainer
            - docker
          vlan: private
          ports:
            - 9443/tcp: 'Portainer HTTPS UI'

        lxc-108:
          ansible_host: 192.168.100.108
          description: 'Loki - Log aggregation and storage'
          additional_ips:
            - 192.168.200.108
          services:
            - loki
          ports:
            - 3100/tcp: 'Loki HTTP API'

        lxc-109:
          ansible_host: 192.168.1.109
          description: 'Semaphore - Ansible UI and task runner'
          os_distribution: ubuntu
          services:
            - semaphore
            - ansible
          ports:
            - 3000/tcp: 'Semaphore web UI'

    # DMZ Services
    # (Public VLAN for internet-facing services)
    lxc_dmz:
      vars:
        vlan: public
        public_internet_facing: true
        proxied_by: zoraxy
      hosts:
        lxc-200:
          ansible_host: 192.168.200.200
          description: 'Zoraxy - Public-facing reverse proxy (DMZ)'
          proxied_by: npm
          proxy_engine: zoraxy
          proxy_scope: public
          services:
            - zoraxy
          ports:
            80/tcp: 'HTTP reverse proxy'
            443/tcp: 'HTTPS reverse proxy'
            8000/tcp: 'Zoraxy admin UI'
          routes:
            - domain: 'nextcloud.anthonyrubick.com'
              target: vm-201:11000

    # ==========================================
    # VIRTUAL MACHINES
    # ==========================================

    vm:
      vars:
        service_type: vm
        container_type: vm
        parent_hypervisor: r730xd-main
        os_family: debian
        os_distribution: debian
      children:
        vm_dmz: null

    vm_dmz:
      vars:
        vlan: public
        public_internet_facing: true
        proxied_by: zoraxy
      hosts:
        vm-201:
          ansible_host: 192.168.200.201
          description: 'Nextcloud - File hosting and collaboration'
          os_distribution: debian
          os_family: debian
          services:
            - nextcloud
          vlan: public
          ports:
            - 11000/tcp: 'Nextcloud HTTP'
            - 8080/tcp: 'Nextcloud AIO webUI'
          mounted_volumes:
            - zfs_dataset: tank1/ds1/nextcloud
              host_path: /tank1/ds1/nextcloud
              guest_path: /mnt/nextcloud
              persistent: true
              description: 'Nextcloud data and backups directory'

    # ==========================================
    # EXTERNAL / STANDALONE HOSTS
    # ==========================================
    external_hosts:
      vars:
        service_type: external
      hosts:
        thinkpad:
          ansible_host: 192.168.1.4
          description: 'ThinkPad 11e - NUT server for UPS monitoring'
          os_distribution: archlinux
          os_family: archlinux
          services:
            - nut-server
          vlan: private
          ports:
            - 22/tcp
            - 3493/tcp
          port_descriptions:
            3493/tcp: 'NUT server listener'
          devices:
            - eaton_5p_ups

    # ==========================================
    # LOGICAL GROUPINGS FOR MANAGEMENT
    # ==========================================

    # All production services (hosted on Proxmox)
    guests:
      children:
        lxc: null
        vm: null

    # Monitoring and observability stack
    monitoring_stack:
      hosts:
        lxc-104: null
        lxc-105: null
        lxc-106: null
        lxc-108: null
        thinkpad: null

    # Public-facing services
    public_services:
      children:
        lxc_dmz: null
        vm_dmz: null

    # Internal-only services
    internal_services:
      children:
        lxc_internal: null
