---
- name: Bootstrap ansible access in Proxmox guests via hypervisor tools
  hosts: r730xd-main
  gather_facts: false
  vars:
    bootstrap_ansible_user: ansible
    bootstrap_install_packages: true
    bootstrap_grant_passwordless_sudo: true
    bootstrap_configure_sshd: true
    bootstrap_lxc_hosts: "{{ groups['lxc'] | default([]) }}"
    bootstrap_vm_hosts: "{{ groups['vm'] | default([]) }}"
    bootstrap_sshd_config_snippet: |
      PermitRootLogin no
      AllowUsers ansible
      KbdInteractiveAuthentication no
      PasswordAuthentication no
      AuthenticationMethods publickey
    bootstrap_guest_setup_script: |
      set -euo pipefail
      user="$BOOTSTRAP_USER"
      key="$(printf %s "$BOOTSTRAP_KEY_B64" | base64 -d)"

      if [ "$CONFIGURE_SSHD" = "true" ]; then
        sshd_conf="/etc/ssh/sshd_config.d/99-bootstrap.conf"
        mkdir -p /etc/ssh/sshd_config.d
        touch "$sshd_conf"
        old_content="$(cat "$sshd_conf")"
        new_content="$(printf '%s\n' "$SSHD_CONFIG_SNIPPET_B64" | base64 -d)"
        if [ "$old_content" != "$new_content" ]; then
          echo "Updating SSHD config with bootstrap snippet"
          printf '%s' "$new_content" > "$sshd_conf"

          systemctl restart sshd 2>/dev/null || systemctl restart ssh 2>/dev/null || true
          echo "CONFIGURED_SSHD:"
        fi
      fi

      if id -u "$user" >/dev/null 2>&1; then
        echo "SKIP_EXISTING_USER: $user"
        exit 0
      fi

      useradd -m -s /bin/bash "$user"

      install -d -m 700 -o "$user" -g "$user" "/home/$user/.ssh"
      touch "/home/$user/.ssh/authorized_keys"
      chmod 600 "/home/$user/.ssh/authorized_keys"
      chown "$user:$user" "/home/$user/.ssh/authorized_keys"

      if ! grep -qxF "$key" "/home/$user/.ssh/authorized_keys"; then
        printf "%s\n" "$key" >> "/home/$user/.ssh/authorized_keys"
      fi

      if [ "$INSTALL_PACKAGES" = "true" ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          if [ "$GRANT_SUDO" = "true" ]; then
            apt-get install -y sudo python3
          else
            apt-get install -y python3
          fi
        elif command -v pacman >/dev/null 2>&1; then
          if [ "$GRANT_SUDO" = "true" ]; then
            pacman -Sy --noconfirm sudo python
          else
            pacman -Sy --noconfirm python
          fi
        fi
      fi

      if [ "$GRANT_SUDO" = "true" ]; then
        echo "$user ALL=(root) NOPASSWD:ALL" > "/etc/sudoers.d/90-$user"
        chmod 440 "/etc/sudoers.d/90-$user"
        visudo -cf "/etc/sudoers.d/90-$user"
      fi

      echo "CREATED_USER: $user"

  vars_prompt:
    - name: bootstrap_ansible_public_key
      prompt: "Paste the SSH public key for the ansible user"
      private: false

  tasks:
    - name: Normalize bootstrap host lists
      ansible.builtin.set_fact:
        bootstrap_lxc_hosts_list: "{{ (bootstrap_lxc_hosts | from_json) if (bootstrap_lxc_hosts is string) else bootstrap_lxc_hosts }}"
        bootstrap_vm_hosts_list: "{{ (bootstrap_vm_hosts | from_json) if (bootstrap_vm_hosts is string) else bootstrap_vm_hosts }}"

    - name: Require ansible public key
      ansible.builtin.assert:
        that:
          - bootstrap_ansible_public_key | length > 0
        fail_msg: >-
          Set bootstrap_ansible_public_key, for example:
          -e "bootstrap_ansible_public_key=$(cat ~/.ssh/ansible_ed25519.pub)"

    - name: Verify Proxmox tooling exists
      ansible.builtin.shell: command -v {{ item }} >/dev/null 2>&1
      args:
        executable: /bin/bash
      loop:
        - pct
        - qm
      changed_when: false

    - name: Bootstrap ansible user in LXC guests via pct exec
      ansible.builtin.shell: |
        set -euo pipefail
        ct_id="{{ item | regex_search('[0-9]+$') }}"

        pct exec "$ct_id" -- /usr/bin/env \
          BOOTSTRAP_USER={{ bootstrap_ansible_user | quote }} \
          BOOTSTRAP_KEY_B64={{ bootstrap_ansible_public_key | b64encode | quote }} \
          BOOTSTRAP_SCRIPT_B64={{ bootstrap_guest_setup_script | b64encode | quote }} \
          INSTALL_PACKAGES={{ (bootstrap_install_packages | bool) | ternary('true', 'false') }} \
          GRANT_SUDO={{ (bootstrap_grant_passwordless_sudo | bool) | ternary('true', 'false') }} \
          CONFIGURE_SSHD={{ (bootstrap_configure_sshd | bool) | ternary('true', 'false') }} \
          SSHD_CONFIG_SNIPPET_B64={{ bootstrap_sshd_config_snippet | b64encode | quote }} \
          bash -lc 'printf %s "$BOOTSTRAP_SCRIPT_B64" | base64 -d | bash'
      args:
        executable: /bin/bash
      loop: "{{ bootstrap_lxc_hosts_list }}"
      register: lxc_bootstrap_results
      changed_when: >-
        'CREATED_USER:' in (stdout | default('')) or
        'CONFIGURED_SSHD:' in (stdout | default(''))

    - name: Check qemu guest agent on VMs
      ansible.builtin.command: qm guest cmd {{ item | regex_search('[0-9]+$') }} ping
      loop: "{{ bootstrap_vm_hosts_list }}"
      register: vm_guest_agent_checks
      changed_when: false
      failed_when: false

    - name: Report VM guest-agent availability
      ansible.builtin.debug:
        msg: >-
          {{ item.item }} guest-agent {{ 'available' if item.rc == 0 else 'NOT available (skipping qm bootstrap)' }}
      loop: "{{ vm_guest_agent_checks.results }}"

    - name: Bootstrap ansible user in VMs via qm guest exec
      ansible.builtin.shell: |
        set -euo pipefail
        vm_id="{{ item.item | regex_search('[0-9]+$') }}"

        qm guest exec "$vm_id" -- /usr/bin/env \
          BOOTSTRAP_USER={{ bootstrap_ansible_user | quote }} \
          BOOTSTRAP_KEY_B64={{ bootstrap_ansible_public_key | b64encode | quote }} \
          BOOTSTRAP_SCRIPT_B64={{ bootstrap_guest_setup_script | b64encode | quote }} \
          INSTALL_PACKAGES={{ (bootstrap_install_packages | bool) | ternary('true', 'false') }} \
          GRANT_SUDO={{ (bootstrap_grant_passwordless_sudo | bool) | ternary('true', 'false') }} \
          CONFIGURE_SSHD={{ (bootstrap_configure_sshd | bool) | ternary('true', 'false') }} \
          SSHD_CONFIG_SNIPPET_B64={{ bootstrap_sshd_config_snippet | b64encode | quote }} \
          bash -lc 'printf %s "$BOOTSTRAP_SCRIPT_B64" | base64 -d | bash'
      args:
        executable: /bin/bash
      loop: "{{ vm_guest_agent_checks.results }}"
      when: item.rc == 0
      register: vm_bootstrap_results
      changed_when: >-
        'CREATED_USER:' in (stdout | default('')) or
        'CONFIGURED_SSHD:' in (stdout | default(''))

    - name: Post-bootstrap reminder for VMs without guest agent
      ansible.builtin.debug:
        msg: >-
          {{ item.item }} skipped because qemu-guest-agent is unavailable.
          Bootstrap this VM once over SSH, or install/enable qemu-guest-agent and re-run.
      loop: "{{ vm_guest_agent_checks.results }}"
      when: item.rc != 0
