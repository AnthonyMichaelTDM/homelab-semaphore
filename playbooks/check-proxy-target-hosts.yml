---
- name: Check route target reachability from reverse proxies
  hosts: reverse_proxies
  gather_facts: false
  become: true # Required for ping command, needs CAP_NET_RAW capability
  tasks:
    - name: Build list of proxied target hosts
      ansible.builtin.set_fact:
        proxied_target_hosts: >-
          {{
            routes | default([])
            | map(attribute='target')
            | map('regex_search', '^[^:]+')
            | unique
            | list
          }}
      when:
        - routes is defined

    - name: Debug proxied target hosts
      ansible.builtin.debug:
        msg: >-
          Proxied target hosts for {{ inventory_hostname }}: {{
            proxied_target_hosts | default('No proxied hosts defined')
          }}
      when:
        - proxied_target_hosts is defined

    - name: Ping each proxied target host from this reverse proxy
      ansible.builtin.command: ping -c 1 -W 1 {{ hostvars[item].ansible_host }}
      loop: "{{ proxied_target_hosts | default([]) }}"
      register: proxy_ping_results
      changed_when: false
      failed_when: false
      when:
        - proxied_target_hosts is defined
        - proxied_target_hosts | length > 0
    
    - name: Debug failed ping results
      ansible.builtin.debug:
        var: (proxy_ping_results.results | rejectattr('rc', 'equalto', 0) | list)
      when:
        - proxy_ping_results is defined

    - name: Fail if one or more proxied hosts are unreachable
      ansible.builtin.assert:
        that:
          - (proxy_ping_results.results | rejectattr('rc', 'ne', 0) | list | length) == (proxy_ping_results.results | length)
        fail_msg: >-
          Unreachable proxied hosts from {{ inventory_hostname }}: {{
            proxy_ping_results.results
            | rejectattr('rc', 'equalto', 0)
            | map(attribute='item')
            | list
            | join(', ')
          }}
        success_msg: >-
          All proxied hosts reachable from {{ inventory_hostname }}: {{ proxied_target_hosts | join(', ') }}
      when:
        - proxy_ping_results is defined
