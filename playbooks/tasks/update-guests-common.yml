---
- name: Check if update script is defined
  ansible.builtin.shell: command -v update
  register: update_script_check
  changed_when: false
  failed_when: false

- name: Debug update script availability
  ansible.builtin.debug:
    msg: >-
      Update script {{ 'found' if update_script_check.rc == 0 else 'NOT found' }} on {{ inventory_hostname }}
      Output: {{ update_script_check.stdout if update_script_check.rc == 0 else 'N/A' }}
      Exit code: {{ update_script_check.rc }}

- name: Run update script on guests that have it defined
  ansible.builtin.debug:
    msg: 'Starting update script on {{ inventory_hostname }} (async with polling feedback)'
  when: update_script_check.rc == 0

- name: Run update script on guests that have it defined
  ansible.builtin.shell: update
  environment: 
    PHS_SILENT: "1" # Set environment variable to make the update script run silently, that is, without interactive prompts
  async: 7200
  poll: 10
  register: update_script_result
  when: update_script_check.rc == 0

- name: Report update script completion
  ansible.builtin.debug:
    msg: >-
      Update script completed on {{ inventory_hostname }} with rc={{ update_script_result.rc | default('unknown') }}
  when: update_script_check.rc == 0

- name: Update package lists and upgrade packages on Debian-based guests
  ansible.builtin.debug:
    msg: 'Starting apt dist-upgrade on {{ inventory_hostname }} (async with polling feedback)'
  when: (ansible_facts['os_family'] == "Debian") and (update_script_check.rc != 0)

- name: Update package lists and upgrade packages on Debian-based guests
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
  async: 7200
  poll: 10
  register: apt_upgrade_result
  when: (ansible_facts['os_family'] == "Debian") and (update_script_check.rc != 0)

- name: Report apt upgrade completion
  ansible.builtin.debug:
    msg: >-
      Apt update/upgrade completed on {{ inventory_hostname }}
  when: (ansible_facts['os_family'] == "Debian") and (update_script_check.rc != 0)

- name: Update package lists and upgrade packages on Arch-based guests
  ansible.builtin.debug:
    msg: 'Starting pacman system upgrade on {{ inventory_hostname }} (async with polling feedback)'
  when: (ansible_facts['os_family'] == "Archlinux") and (update_script_check.rc != 0)

- name: Update package lists and upgrade packages on Arch-based guests
  ansible.builtin.pacman:
    update_cache: yes
    upgrade: yes
  async: 7200
  poll: 10
  register: pacman_upgrade_result
  when: (ansible_facts['os_family'] == "Archlinux") and (update_script_check.rc != 0)

- name: Report pacman upgrade completion
  ansible.builtin.debug:
    msg: >-
      Pacman update/upgrade completed on {{ inventory_hostname }}
  when: (ansible_facts['os_family'] == "Archlinux") and (update_script_check.rc != 0)
